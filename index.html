<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">

    <title>Frontend Mentor | NFT preview card component</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap"
      rel="stylesheet">

  </head>
  <body>

    <main class="nft-page">
      <article class="nft-card">
        <figure class="card-image">
          <img src="image-equilibrium.jpg" alt="Equilibrium #3429 - a glowing glass cube">
        </figure>

        <section class="card-content">
          <h1>Equilibrium #3429</h1>
          <p>Our Equilibrium collection promotes balance and calm.</p>
          <div class="card-status">
            <span class="price">
              <img src="icon-ethereum.svg" alt="">
              0.041 ETH
            </span>
            <span class="time-left">
              <img src="icon-clock.svg" alt="">
              3 days left
            </span>
          </div>
          <hr>
          <footer class="card-footer">
            <img src="image-avatar.png" alt="Jules Wyvern avatar">
            <p>Creation of<a href="#">Jules Wyvern</a></p>
          </footer>
        </section>

      </article>
    </main>
  </body>
</html>
